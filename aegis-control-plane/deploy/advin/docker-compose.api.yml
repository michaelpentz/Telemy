name: aegis

services:
  postgres:
    image: postgres:16-alpine
    container_name: aegis-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  aegis-api:
    image: alpine:3.20
    container_name: aegis-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./bin/aegis-api:/usr/local/bin/aegis-api:ro
    ports:
      - "8080:8080"
    command: ["/usr/local/bin/aegis-api"]

  aegis-jobs:
    image: alpine:3.20
    container_name: aegis-jobs
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    volumes:
      - ./bin/aegis-jobs:/usr/local/bin/aegis-jobs:ro
    command: ["/usr/local/bin/aegis-jobs"]

volumes:
  postgres-data:
